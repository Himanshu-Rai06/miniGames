<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Run</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="../index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Menu
    </a>

    <div id="game-frame" data-theme="forest-day">
        
        <div class="environment-bg">
            <div class="sky-gradient"></div>
            <div class="sun-moon"></div>
            
            <div class="mountains-back parallax-slowest"></div>
            <div class="mountains-mid parallax-slow"></div>
            <div class="mountains-front parallax-mid"></div>
            
            <div class="clouds-container parallax-mid">
                <div class="cloud c1">
                    <div class="cloud-puff puff1"></div>
                    <div class="cloud-puff puff2"></div>
                </div>
                <div class="cloud c2">
                    <div class="cloud-puff puff1"></div>
                    <div class="cloud-puff puff2"></div>
                </div>
                <div class="cloud c3">
                    <div class="cloud-puff puff1"></div>
                    <div class="cloud-puff puff2"></div>
                </div>
            </div>

            <div class="birds parallax-fast">
                <div class="bird b1">v</div>
                <div class="bird b2">v</div>
            </div>
            
            <div class="ground-horizon"></div>
        </div>

        <div class="weather-layer" id="weatherLayer"></div>

        <div class="hud-top">
            <div class="distance-badge">
                <i class="fa-solid fa-route"></i>
                <span id="distance">0m</span>
            </div>

            <div class="distance-badge" style="margin-left: 10px; background: var(--primary);">
                🏆 <span id="highscore">0</span>m
            </div>
        </div>

        <div class="hud-side">
            <div class="boost-track">
                <div id="boost-fill"></div>
            </div>
            <div class="boost-icon" id="boost-icon">
                <i class="fa-solid fa-bolt"></i>
            </div>
        </div>

        <div class="scene">
            <div class="world" id="world">
                
                <div class="track">
                    <div class="lane-line left-line"></div>
                    <div class="lane-line right-line"></div>
                    
                    <div class="player-group" id="playerGroup">
                        <div class="cube" id="cubeMesh">
                            <div class="face front"></div>
                            <div class="face back"></div>
                            <div class="face right"></div>
                            <div class="face left"></div>
                            <div class="face top"></div>
                            <div class="face bottom"></div>
                        </div>
                        <div class="shadow" id="playerShadow"></div>
                    </div>
                    
                </div>
            </div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="overlay-box">
                <h1>Cube Run</h1>
                <p>Swipe or use arrow keys</p>
                <button id="startBtn">Play</button>
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <div class="overlay-box">
                <h1>Ouch!</h1>
                <p>Distance: <span id="finalScore">0</span>m</p>
                <button id="restartBtn">Try Again</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
